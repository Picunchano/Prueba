services:
  postgres:
    image: postgres:16-alpine
    container_name: nanaconecta_db
    environment:
      POSTGRES_USER: nana_user
      POSTGRES_PASSWORD: nana_pass_2024
      POSTGRES_DB: nanaconecta_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nana_user -d nanaconecta_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: nanaconecta_backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://nana_user:nana_pass_2024@postgres:5432/nanaconecta_db"
      JWT_SECRET: "nanaconecta_jwt_secret_super_seguro_2024_xyz"
      PORT: 3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
