apiVersion: apps/v1
kind: Deployment
metadata:
  name: nanaconecta-backend
  namespace: nanaconecta
  labels:
    app.kubernetes.io/name: nanaconecta-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: nanaconecta-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nanaconecta-backend
    spec:
      containers:
        - name: backend
          image: nanaconecta-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: nanaconecta-backend-config
            - secretRef:
                name: nanaconecta-backend-secret
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      restartPolicy: Always